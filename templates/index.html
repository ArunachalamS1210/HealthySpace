<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Spaces – A Biophilic-Tech Advisory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f4c75 0%, #3282b8 50%, #bbe1fa 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header Section */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }
        
        .main-title {
            color: #ffffff;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 12px;
            display: inline-block;
        }
        
        .main-subtitle {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.2rem;
            font-weight: 400;
            opacity: 0.9;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 10px;
        }
        
        /* Card Container */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        /* Primary Ayul Card - Full Width */
        .primary-card {
            background: linear-gradient(135deg, #1a237e, #3949ab, #5c6bc0);
            color: white;
            padding: 50px 40px;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(26, 35, 126, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .primary-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.1) 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .primary-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 50px rgba(26, 35, 126, 0.6);
        }
        
        .primary-card:hover::before {
            opacity: 1;
        }
        
        /* Secondary Cards Container */
        .secondary-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .secondary-card {
            background: linear-gradient(135deg, #00695c, #00897b, #4db6ac);
            color: white;
            padding: 40px 30px;
            border-radius: 18px;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 12px 25px rgba(0, 105, 92, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .secondary-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.15) 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .secondary-card:hover {
            transform: scale(1.03);
            box-shadow: 0 18px 40px rgba(0, 105, 92, 0.5);
        }
        
        .secondary-card:hover::before {
            opacity: 1;
        }
        
        /* Card Content Styling */
        .card-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }
        
        .secondary-card .card-icon {
            font-size: 3.5rem;
            margin-bottom: 18px;
        }
        
        .card-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }
        
        .secondary-card .card-title {
            font-size: 1.6rem;
            margin-bottom: 10px;
        }
        
        .card-subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 15px;
            opacity: 0.9;
        }
        
        .card-description {
            font-size: 1rem;
            opacity: 0.85;
            line-height: 1.5;
            max-width: 400px;
        }
        
        .secondary-card .card-description {
            font-size: 0.95rem;
            max-width: 300px;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.2rem;
            }
            
            .main-subtitle {
                font-size: 1rem;
            }
            
            .secondary-cards {
                grid-template-columns: 1fr;
            }
            
            .primary-card {
                padding: 40px 30px;
            }
            
            .secondary-card {
                padding: 35px 25px;
            }
            
            .card-title {
                font-size: 1.7rem;
            }
            
            .secondary-card .card-title {
                font-size: 1.4rem;
            }
        }
        
        @media (max-width: 480px) {
            .main-container {
                padding: 10px;
            }
            
            .header-section {
                padding: 20px 15px;
                margin-bottom: 30px;
            }
            
            .main-title {
                font-size: 1.8rem;
            }
            
            .cards-container {
                gap: 20px;
            }
            
            .primary-card {
                padding: 30px 20px;
            }
            
            .secondary-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header Section -->
        <div class="header-section">
            <h1 class="main-title">Healthy Spaces</h1>
        </div>
        
        <div class="cards-container">
            <!-- Primary Ayul Card -->
            <a href="/well-dashboard" class="primary-card">
                <div class="card-icon">🌿</div>
                <div class="card-title">Ayul</div>
                <div class="card-subtitle">A Human Centric Dashboard</div>
                <div class="card-description">
                    Comprehensive wellness monitoring dashboard
                </div>
            </a>
            
            <!-- Secondary Cards -->
            <div class="secondary-cards">
                <a href="/vendor-intelligence" class="secondary-card">
                    <div class="card-icon">🔍</div>
                    <div class="card-title">Vendor Intelligence</div>
                    <div class="card-description">
                        Smart vendor selection & comparison system for biophilic consulting projects
                    </div>
                </a>
                
                <a href="/project-management" class="secondary-card">
                    <div class="card-icon">📊</div>
                    <div class="card-title">Project Management</div>
                    <div class="card-description">
                        Track and manage wellness & biophilic consulting project lifecycles
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
